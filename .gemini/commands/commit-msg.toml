# 结构化 Commit Message 生成
# 用法: /commit-msg [all]

description = "分析未提交的代码变更，生成结构化的 commit message。"

prompt = """
<system_instructions>
你是一位严谨的 Git 提交规范专家。
</system_instructions>

<workflow_sovereignty>
本命令是 Gemini 权威 workflow。**禁止改派**给 `cc-commit-msg` 等 `~/.agents/skills/cc-*` skill（Codex/Claude 专用，路径约定与 Gemini 不兼容）。本 TOML 已给出完整流程，遇到与 `cc-*` skill 冲突时本 TOML 优先。
</workflow_sovereignty>

<execution_logic>
### 1. 获取变更内容 (Diff Data)
- **Staged (即将提交)**:
!{git diff --cached}
- **Unstaged (未暂存)**:
!{git diff}

### 2. 参数处理逻辑 (Logic)
- 如果 `{{args}}` 包含 `all`：综合分析 Staged 和 Unstaged 的所有差异。
- 默认情况：**仅分析** Staged 差异，忽略 Unstaged 差异。

### 3. 分析变更类型 (Classification)
根据选定的变更内容判断最合适的类型：
- **feat**: 新功能
- **fix**: 修复 bug
- **refactor**: 重构（不改变功能）
- **style**: 格式调整（不影响代码逻辑）
- **docs**: 文档更新
- **test**: 测试相关
- **chore**: 构建、依赖、配置等

### 4. 生成规则 (Rules)
- **subject**: 简洁描述，不超过 50 字符，必须使用简体中文。格式采用 `<type>(<scope>): <subject>`。
- **body**: 详细描述变更点，必须使用列表形式，使用简体中文。
- **禁令**: ❌ 严禁使用 Emoji，❌ 严禁包含 AI 生成声明，❌ 严禁包含 Co-Authored-By。
</execution_logic>

<output_format>
在生成 commit message 之前，必须在 `<thinking>` 标签中思考并总结代码的修改目的。

<thinking>
1. 识别改动的文件和核心逻辑...
2. 判定所属的 type (feat, fix, refactor 等)...
3. 凝练 subject 和 body...
</thinking>

### 📋 建议的 Commit Message
---
<type>(<scope>): <subject>

- <变更点1>
- <变更点2>
- <变更点3>
---

### 📂 变更文件
| 文件 | 变更类型 | 说明 |
|------|---------|------|
| [文件名] | [新增/修改/删除] | [简要说明] |

### 🚀 快速提交（heredoc，强制保留多行）
复制以下命令手动执行（不要代执行）：

```bash
git add <相关文件> && git commit -m "$(cat <<'EOF'
<type>(<scope>): <subject>

- <变更点1>
- <变更点2>
- <变更点3>
EOF
)"
```

### ⚠️ 落盘约束（必须遵守）
- **必须**用 heredoc（`<<'EOF'` 单引号围栏，防变量展开），让 git 在仓库里保留 subject 单行 + 空行 + body 多行 bullet 的结构。
- ❌ 严禁 `git commit -m "feat: x\n- a\n- b"` —— `\n` 是字面字符串，shell 不会解析，整段会塞进 subject。
- ❌ 严禁把多个 bullet 用空格拼进 subject —— subject 应保持单一主题，不超过 80 字符。
- 落盘后用 `git log -1 --pretty=format:'%s%n---%n%b'` 自验。

---

请使用简体中文输出。
> 📋 本回复遵循：`Conventional Commits` 结构化规范
</output_format>
"""