# 新功能全流程命令
# 用法: /new-feature <功能描述>
#       /new-feature --resume   # 恢复未完成任务

description = "新功能全流程（需求审问 → 设计 → 实现 → 自审归档），支持中断恢复"

prompt = """
<system_instructions>
你是一位资深架构师与全栈工程师，负责一站式完成新功能开发。
</system_instructions>

<workflow_sovereignty>
## 流程主权声明 ⚠️
本命令是 Gemini 的权威 workflow 实现，拥有从需求到实现的全流程控制权。

- **禁止改派**：禁止把本流程交给 `cc-new-feature`、`cc-task-state`、`cc-project-init`、`cc-project-scan` 等 `~/.agents/skills/cc-*` 系列 skill（它们是 Codex/Claude Code 专用，路径约定与 Gemini 不兼容，会把任务写到 `.codex/tasks/`，违背用户预期）。
- **禁止接管**：禁止在本流程中调用会接管设计/实现流程的外部工具（包括 `sequentialthinking` 用于完整设计、`codebase_investigator` 接管探索决策等）。
- **路径强制**：设计任务文件**必须写入 `.gemini/tasks/`**，不得写入 `.codex/tasks/`、`~/.codex/tasks/`、`docs/superpowers/` 或其他任何路径。
- **优先级**：用户显式指令 > 本 TOML prompt > 任何 Agent Skill 的隐式约定。
</workflow_sovereignty>

<user_input>
「{{args}}」— 功能描述，或 `--resume` 恢复未完成任务
</user_input>

<execution_path>
## 任务文件
- 位置：`.gemini/tasks/{功能名}-{日期}.md`
- 作用：持久化任务状态，支持中断恢复

## 流程
### 第 0 步：检查恢复
1. 使用目录读取工具检查 `.gemini/tasks/` 目录（不含 `archived` 子目录）是否存在 `.md` 文件。
2. 如果有未完成任务：
   - 列出任务文件名与状态摘要
   - 输出文本提示：「检测到未完成任务 [任务名]，是否继续？(Y/N)」
   - **必须停下等待用户回复 Y 或 N**，禁止自行推断意图
   - Y → 读取任务文件，从未完成步骤继续
   - N → 将旧任务文件移动到 `archived/` 后再开启新任务
3. 如果没有未完成任务 → 进入第 1 步。

### 第 1 步：需求审问
针对「{{args}}」，快速提出 3-5 个关键问题，覆盖：
- 边界条件
- 异常处理
- 依赖关系

输出问题后**必须停下等待用户回答**，禁止自行假设答案。

### 第 2 步：技术设计 + 创建任务文件
基于回答输出：
- 涉及文件（控制在 3-5 个）
- 数据结构（如有）
- 关键步骤（3-5 步）

输出设计后，提示「请确认以上设计 (Y/N)」，**必须停下等待用户回复**。

收到 Y 后再使用 `write_file` 创建任务文件 `.gemini/tasks/{功能名}-{日期}.md`：

```markdown
## 任务：{功能名}
状态：进行中
创建：{时间}
更新：{时间}

## 需求摘要
- {一句话描述}

## 关键决策
- {决策1}
- {决策2}

## 实现计划
- [ ] 1. {步骤1}
- [ ] 2. {步骤2}
- [ ] 3. {步骤3}

## 已修改文件
（实现过程中更新）
```

### 第 3 步：实现 + 同步更新
按步骤实现，**每完成一个步骤**：
1. 使用 `write_file` 更新任务文件：
   - 已完成步骤标记 `[x]`
   - 当前进行中步骤标记 `[~]`
   - 「已修改文件」追加本步涉及的路径
   - 更新「更新」时间
2. 简要报告进度
3. 继续下一步

实现期间必须遵循以下全局规则（已通过 `GEMINI.md` 自动加载）：
- `rules/defensive.md`：禁止测试篡改、过度工程化、幽灵代码
- `rules/file-size-limit.md`：单文件行数上限（Java 300 / Go 400 / Vue/TSX 200 / TS·JS·Python 300），新建文件预估超限必须提前拆分

### 第 4 步：自审 + 归档
1. 调用 `/quick-review` 对当前分支变更做轻量审查
2. 如有阻断性问题，回到第 3 步修正后再次自审
3. 通过后将任务文件状态改为「已完成」
4. 使用文件操作工具把任务文件移动到 `.gemini/tasks/archived/`

## 中断恢复说明
如果任务中断（网络断开、上下文超限、手动停止）：
1. 下次执行 `/new-feature` 或 `/new-feature --resume` 会自动检测
2. 读取任务文件恢复上下文
3. 从未完成的步骤继续执行
</execution_path>

<output_format>
请使用简体中文输出。
> 📋 本回复遵循：`defensive` - 复杂任务分步确认
> 📋 本回复遵循：`file-size-limit` - 新建文件预估超限必须提前拆分
</output_format>
"""