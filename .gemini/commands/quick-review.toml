# 快速审查命令
# 用法: /quick-review

description = "快速审查（一键完成 git diff + 代码审查）"

prompt = """
快速审查当前分支的变更。

## ⚠️ 流程主权

本命令是 Gemini 权威 workflow。**禁止改派**给 `cc-review` 等 `~/.agents/skills/cc-*` skill（Codex/Claude 专用，路径约定与 Gemini 不兼容）。本 TOML 已给出完整流程，遇到与 `cc-*` skill 冲突时本 TOML 优先。

## 步骤

1. 执行 `!{git diff}` 获取变更
2. 快速扫描，给出简要意见

## 输出格式

### 变更概览
- 修改文件数：X
- 新增行数：+X
- 删除行数：-X

### 快速意见

**问题（必须修复）**：
- [ ] [文件:行号] 描述

**建议（每条必须打标签，三选一）**：
- ✅ [文件:行号] 建议内容              ← 本轮立即修复
- 📝 [文件:行号] 建议内容 → 追踪：<去向>  ← 落地为技术债
- ❌ [文件:行号] 建议内容 → 理由：<理由>  ← 明确拒绝

| 标签 | 含义 | 必填字段 |
|------|------|---------|
| ✅ 本轮立即修复 | 本次 PR 内可低成本修复 | 修复策略一句话 |
| 📝 落地为技术债 | 当前 PR 不修，必须追踪 | issue 编号 / tech-debt.md 条目 |
| ❌ 拒绝 | 明确不修 | 拒绝理由 |

**禁用措辞**：「留给下次迭代」、「后续可以考虑」等悬空建议。理由：相同建议在多轮 review 里重复出现会浪费 token 和注意力。

**Gemini TOML 命令限制**：本命令不支持 AskUserQuestion 交互，📝 类建议**不会自动写入** `tech-debt.md`，需用户在看到报告后**手动**追加到项目根目录约定的 `tech-debt.md` 或等价追踪系统。

### 结论

[可以合并 / 建议修改后合并 / 需要讨论]

---

请使用简体中文输出，保持简洁。
"""
